<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/landing-page.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <title>Luminary</title>
  </head>
  <body>
    <header>
      <nav aria-label="primary navigation" class="py-4">Luminary Nav</nav>
      <section aria-label="hero">

    <main class="container grid gap-8 py-8 place-center">
      <section aria-label="app features" class="py-6">
        <h2>App Features</h2>
      </section>

      <section aria-label="team & contribution" class="py-6">
        <h2>Team &amp; Contribution</h2>
      </section>

      <section aria-label="featured stories" class="py-6">
        <h2>Featured Stories</h2>
      </section>

    <footer aria-label="CTA & footer" class="py-8">
      <div class="container py-6">
        <p>Call to action and footer information will appear here.</p>
      </div>
    </footer>
